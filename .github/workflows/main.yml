name: Ultimate Auto APK Builder

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      app_version:
        description: 'Version'
        required: true
      dart_code:
        description: 'main.dart code'
        required: true
      asset_urls:
        description: 'Comma separated image URLs'
        required: false
      app_icon_url:
        description: 'App Icon Image URL (Direct PNG/JPG link)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ Setup Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setting up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📁 Creating Project & Adding Permissions
        env:
          DART_CODE: ${{ github.event.inputs.dart_code }}
        run: |
          flutter create --org ${{ github.event.inputs.package_name }} ${{ github.event.inputs.app_name }}
          cd ${{ github.event.inputs.app_name }}

          # Update version
          sed -i "s/version: 1.0.0+1/version: ${{ github.event.inputs.app_version }}/g" pubspec.yaml

          # Internet permission
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' android/app/src/main/AndroidManifest.xml

          # ✅ KEY FIX: printf preserves \n newlines from env var perfectly
          printf '%s' "$DART_CODE" > lib/main.dart

          # Verify
          echo "--- main.dart line count ---"
          wc -l lib/main.dart

          # Download Assets if provided
          if [ -n "${{ github.event.inputs.asset_urls }}" ]; then
            mkdir -p assets
            IFS=',' read -ra ADDR <<< "${{ github.event.inputs.asset_urls }}"
            for i in "${ADDR[@]}"; do
              wget -q -P assets/ "$i"
            done
            echo "  assets:" >> pubspec.yaml
            echo "    - assets/" >> pubspec.yaml
          fi

      - name: 🖼️ Setup App Icon
        run: |
          cd ${{ github.event.inputs.app_name }}
          if [ -n "${{ github.event.inputs.app_icon_url }}" ]; then
            echo "Downloading App Icon..."
            mkdir -p assets
            wget -O assets/app_icon.png "${{ github.event.inputs.app_icon_url }}"
            if [ -s assets/app_icon.png ]; then
              echo "App icon downloaded successfully. Applying..."
              flutter pub add --dev flutter_launcher_icons
              echo "" >> pubspec.yaml
              echo "flutter_launcher_icons:" >> pubspec.yaml
              echo "  android: \"launcher_icon\"" >> pubspec.yaml
              echo "  ios: true" >> pubspec.yaml
              echo "  image_path: \"assets/app_icon.png\"" >> pubspec.yaml
              flutter pub get
              dart run flutter_launcher_icons
            else
              echo "ERROR: Icon download failed. Default icon will be used."
            fi
          else
            echo "No App Icon URL provided. Skipping."
          fi

      - name: 📦 Auto-Detect & Install Packages
        run: |
          cd ${{ github.event.inputs.app_name }}
          grep -oP '(?<=package:)[^/]+' lib/main.dart | grep -v '^flutter$' | sort -u | xargs -r flutter pub add
          flutter pub get

      - name: 🔨 Compiling Dart & Building APK
        run: |
          cd ${{ github.event.inputs.app_name }}
          flutter build apk --release

      - name: ✅ Uploading Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: ${{ github.event.inputs.app_name }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
