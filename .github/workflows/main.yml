name: Ultimate Auto APK Builder

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name (e.g., safecash)'
        required: true
        default: 'my_app'
      package_name:
        description: 'Package Name (e.g., com.swagnivas.safecash)'
        required: true
        default: 'com.example.myapp'
      app_version:
        description: 'Version (e.g., 1.0.0+1)'
        required: true
        default: '1.0.0+1'
      dart_code:
        description: 'Paste main.dart code here'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🛠️ Create Flutter Project & Add Code
        run: |
          # 1. వెబ్‌సైట్ లో ఇచ్చిన పేర్లతో కొత్త ఫ్లట్టర్ ప్రాజెక్ట్ క్రియేట్ చేస్తుంది
          flutter create --org ${{ github.event.inputs.package_name }} ${{ github.event.inputs.app_name }}
          cd ${{ github.event.inputs.app_name }}
          
          # 2. వెబ్‌సైట్ లో ఇచ్చిన వర్షన్ ని pubspec.yaml లో అప్‌డేట్ చేస్తుంది
          sed -i "s/version: 1.0.0+1/version: ${{ github.event.inputs.app_version }}/g" pubspec.yaml
          
          # 3. వెబ్‌సైట్ నుండి వచ్చిన Dart కోడ్ ని main.dart లో రాస్తుంది
          cat << 'EOF' > lib/main.dart
          ${{ github.event.inputs.dart_code }}
          EOF

      - name: 📦 Build Release APK
        run: |
          cd ${{ github.event.inputs.app_name }}
          flutter build apk --release

      - name: 🚀 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: ${{ github.event.inputs.app_name }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
